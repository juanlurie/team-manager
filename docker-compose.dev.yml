services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME_DEV}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME_DEV}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: ./src/TeamManager.Api
      dockerfile: Dockerfile
    command: ["--migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${DB_NAME_DEV};Username=${DB_USER};Password=${DB_PASSWORD}"
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./src/TeamManager.Api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${DB_NAME_DEV};Username=${DB_USER};Password=${DB_PASSWORD}"
      Jwt__ClientSecret: ${GOOGLE_CLIENT_SECRET}
    networks:
      - default
    ports:
      - "5002:5000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  ui:
    build:
      context: ./team-manager-ui
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_dev_data:
    name: team-manager-dev_postgres_data

networks:
  default:
    name: team-manager-dev_default
