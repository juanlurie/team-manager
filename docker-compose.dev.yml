services:
  api:
    image: team-manager-api:dev
    build:
      context: ./src/TeamManager.Api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres_db;Port=5432;Database=team_manager_dev;Username=postgres;Password=postgres"
    networks:
      - default
      - postgres_default
    ports:
      - "5002:5000"

  ui:
    image: team-manager-ui:dev
    build:
      context: ./team-manager-ui
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api

networks:
  default:
    name: team-manager-dev_default
  postgres_default:
    external: true
    name: postgres_default
