services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    image: team-manager-api:local
    command: ["--migrate"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    image: team-manager-api:local
    build:
      context: ./src/TeamManager.Api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      Jwt__Authority: "https://accounts.google.com"
      Jwt__Audience: "${GOOGLE_CLIENT_ID}.apps.googleusercontent.com"
    networks:
      - default
    ports:
      - "5000:5000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  ui:
    image: team-manager-ui:local
    build:
      context: ./team-manager-ui
      dockerfile: Dockerfile
      args:
        GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
    ports:
      - "80:80"
    volumes:
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - api
      - mcp-gateway
    restart: unless-stopped

  mcp-gateway:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -c "pip install -q httpx 'mcp[cli]' uvicorn starlette &&
             python3 /app/server.py"
    volumes:
      - ./mcp-server:/app
    environment:
      TEAM_MANAGER_API_URL: ${TEAM_MANAGER_API_URL}
      TEAM_MANAGER_API_KEY: ${TEAM_MANAGER_API_KEY}
      MCP_PORT: "8765"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
    name: team-manager_postgres_data

networks:
  default:
    name: team-manager_default
