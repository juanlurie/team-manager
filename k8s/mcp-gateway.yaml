apiVersion: v1
kind: Service
metadata:
  name: mcp-gateway
  namespace: team-manager
spec:
  selector:
    app: mcp-gateway
  ports:
    - port: 8765
      targetPort: 8765
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  namespace: team-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-gateway
  template:
    metadata:
      labels:
        app: mcp-gateway
    spec:
      containers:
        - name: mcp-gateway
          image: ghcr.io/juanlurie/team-manager-mcp:5d43c8f00f0d6677664a68389e84299f64fd227b
          ports:
            - containerPort: 8765
          env:
            - name: TEAM_MANAGER_API_URL
              value: http://api:5000
            - name: MCP_PORT
              value: "8765"
