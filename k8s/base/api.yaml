apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/juanlurie/team-manager-api
          args: ["--migrate"]
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: db-password
            - name: ConnectionStrings__DefaultConnection
              value: "Host=db;Port=5432;Database=$(DB_NAME);Username=$(DB_USER);Password=$(DB_PASSWORD)"
      containers:
        - name: api
          image: ghcr.io/juanlurie/team-manager-api
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:5000
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: db-password
            - name: ConnectionStrings__DefaultConnection
              value: "Host=db;Port=5432;Database=$(DB_NAME);Username=$(DB_USER);Password=$(DB_PASSWORD)"
            - name: Jwt__Authority
              value: "https://accounts.google.com"
            - name: Jwt__Audience
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: google-client-id
            - name: Jwt__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: google-client-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
