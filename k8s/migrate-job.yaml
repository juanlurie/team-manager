apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: team-manager
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h db -p 5432; do echo "waiting for db..."; sleep 2; done
      containers:
        - name: migrate
          image: ghcr.io/juanlurie/team-manager-api:latest
          args: ["--migrate"]
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: db-name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: team-manager-secrets
                  key: db-password
            - name: ConnectionStrings__DefaultConnection
              value: "Host=db;Port=5432;Database=$(DB_NAME);Username=$(DB_USER);Password=$(DB_PASSWORD)"
