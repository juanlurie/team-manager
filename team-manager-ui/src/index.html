<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Team Manager</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#131e2b">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body class="mat-typography">
  <app-root>
    <div id="boot-splash" style="
      position:fixed;inset:0;background:#0f1117;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
      font-family:Roboto,sans-serif;
    ">
      <div style="position:relative;width:72px;height:72px;display:flex;align-items:center;justify-content:center;">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="#64b5f6" style="z-index:1">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
        <div style="
          position:absolute;inset:0;border-radius:50%;
          border:2px solid transparent;
          border-top-color:#64b5f6;border-right-color:rgba(100,181,246,0.3);
          animation:_spin 1s linear infinite;
        "></div>
      </div>
      <div style="font-size:1.1rem;font-weight:600;color:rgba(255,255,255,0.6);letter-spacing:0.04em;">Team Manager</div>
      <div style="display:flex;gap:6px;">
        <span style="width:6px;height:6px;border-radius:50%;background:rgba(100,181,246,0.5);animation:_dot 1.2s ease-in-out infinite;"></span>
        <span style="width:6px;height:6px;border-radius:50%;background:rgba(100,181,246,0.5);animation:_dot 1.2s ease-in-out 0.2s infinite;"></span>
        <span style="width:6px;height:6px;border-radius:50%;background:rgba(100,181,246,0.5);animation:_dot 1.2s ease-in-out 0.4s infinite;"></span>
      </div>
    </div>
    <style>
      @keyframes _spin { to { transform:rotate(360deg); } }
      @keyframes _dot { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    </style>
  </app-root>
</body>
</html>
