name: Promote to Prod

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Image SHA to promote (leave blank to use current beta)'
        required: false
        type: string

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve SHA
        id: sha
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            echo "sha=${{ inputs.sha }}" >> $GITHUB_OUTPUT
          else
            BETA_SHA=$(grep 'newTag:' k8s/overlays/beta/kustomization.yaml | head -1 | sed "s/.*newTag: \"\(.*\)\"/\1/")
            echo "sha=$BETA_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Update prod overlay image tags
        run: |
          sed -i "s|newTag: .*|newTag: \"${{ steps.sha.outputs.sha }}\"|g" k8s/overlays/prod/kustomization.yaml

      - name: Commit and push prod manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore: promote ${{ steps.sha.outputs.sha }} to prod [skip ci]"
          git push

      - name: Summary
        run: |
          echo "### Promoted to prod" >> $GITHUB_STEP_SUMMARY
          echo "Image SHA: \`${{ steps.sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
