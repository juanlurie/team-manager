name: Build & Push

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'

env:
  REGISTRY: ghcr.io
  OWNER: juanlurie

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./src/TeamManager.Api
          file: ./src/TeamManager.Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI
        uses: docker/build-push-action@v5
        with:
          context: ./team-manager-ui
          file: ./team-manager-ui/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-ui:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push MCP gateway
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          file: ./mcp-server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-mcp:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update k8s image tags
        run: |
          sed -i "s|${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-api:.*|${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-api:${{ github.sha }}|g" k8s/api.yaml
          sed -i "s|${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-ui:.*|${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-ui:${{ github.sha }}|g" k8s/ui.yaml
          sed -i "s|${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-mcp:.*|${{ env.REGISTRY }}/${{ env.OWNER }}/team-manager-mcp:${{ github.sha }}|g" k8s/mcp-gateway.yaml

      - name: Commit and push manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/api.yaml k8s/ui.yaml k8s/mcp-gateway.yaml
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
          git push
